name: Deploy — VM de Teste

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do deploy manual'
        required: false
        default: 'teste manual'

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Lint + Type check
  # ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace=api || true

      - name: Lint Web
        run: npm run lint --workspace=web || true

      - name: Type check API
        run: cd apps/api && npx tsc --noEmit -p tsconfig.build.json || true

      - name: Type check Web
        run: npm run type-check --workspace=web || true

  # ─────────────────────────────────────────
  # Build das imagens Docker (tag: develop)
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images (develop)
    runs-on: ubuntu-latest
    needs: lint
    environment: develop

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repo lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build & push imagem da API (develop)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/api:develop
            ghcr.io/${{ env.REPO_LOWER }}/api:develop-${{ github.sha }}
          cache-from: type=gha,scope=api-develop
          cache-to: type=gha,mode=max,scope=api-develop

      - name: Build & push imagem do Web (develop)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_TEST }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL_TEST }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/web:develop
            ghcr.io/${{ env.REPO_LOWER }}/web:develop-${{ github.sha }}
          cache-from: type=gha,scope=web-develop
          cache-to: type=gha,mode=max,scope=web-develop

      - name: Build & push imagem do OCR Worker (develop)
        uses: docker/build-push-action@v6
        with:
          context: services/ocr-worker
          dockerfile: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/ocr-worker:develop
            ghcr.io/${{ env.REPO_LOWER }}/ocr-worker:develop-${{ github.sha }}
          cache-from: type=gha,scope=ocr-worker-develop
          cache-to: type=gha,mode=max,scope=ocr-worker-develop

  # ─────────────────────────────────────────
  # Deploy na VM de teste via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy VM de Teste
    runs-on: self-hosted
    needs: build
    environment: develop

    steps:
      - uses: actions/checkout@v4

      - name: Copiar arquivos de infra
        run: |
          sudo mkdir -p /opt/inventech/apps/api/docker/minio /opt/inventech/infra/nginx
          sudo cp docker-compose.prod.yml /opt/inventech/
          sudo cp apps/api/docker/minio/init-buckets.sh /opt/inventech/apps/api/docker/minio/
          sudo cp infra/nginx/inventech-test.conf /opt/inventech/infra/nginx/

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -e
          cd /opt/inventech

          REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')

          echo "→ Fazendo login no GHCR..."
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          echo "→ Baixando imagens develop..."
          IMAGE_TAG=develop GITHUB_REPOSITORY_LOWER=$REPO_LOWER \
            docker compose -f docker-compose.prod.yml --env-file .env pull api web ocr-worker

          echo "→ Rodando migrations do banco..."
          IMAGE_TAG=develop GITHUB_REPOSITORY_LOWER=$REPO_LOWER \
            docker compose -f docker-compose.prod.yml --env-file .env \
            run --rm api sh -c "cd apps/api && npx prisma migrate deploy"

          echo "→ Subindo todos os serviços..."
          IMAGE_TAG=develop GITHUB_REPOSITORY_LOWER=$REPO_LOWER \
            docker compose -f docker-compose.prod.yml --env-file .env \
            up -d --no-build --remove-orphans

          echo "→ Aguardando API ficar saudável..."
          timeout 90 bash -c 'until docker inspect --format="{{.State.Health.Status}}" inventech_api 2>/dev/null | grep -q "healthy"; do sleep 3; done'

          echo "→ Configurando Nginx (HTTP)..."
          NGINX_CONF="/etc/nginx/sites-available/inventech-test.conf"
          sudo cp /opt/inventech/infra/nginx/inventech-test.conf "$NGINX_CONF"
          sudo ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/inventech-test.conf
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl reload nginx

          echo "→ Limpando imagens antigas..."
          docker image prune -f

          VM_IP=$(hostname -I | awk '{print $1}')
          echo ""
          echo "✓ Deploy de teste concluído!"
          echo "  Acesse: http://$VM_IP"
          echo "  Health: http://$VM_IP/api/v1/health/ping"
