services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: manutencao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - manutencao_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: manutencao_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - manutencao_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: manutencao_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"       # API S3
      - "${MINIO_CONSOLE_PORT}:9001"   # Console web
    volumes:
      - minio_data:/data
    networks:
      - manutencao_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────
  # MinIO Client — cria buckets automaticamente
  # ─────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: manutencao_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /init-buckets.sh
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_PORT: ${MINIO_API_PORT}
    networks:
      - manutencao_network
    restart: on-failure

  # ─────────────────────────────────────────
  # Redis Insight — GUI para Redis (opcional)
  # ─────────────────────────────────────────
  redis_insight:
    image: redis/redisinsight:latest
    container_name: manutencao_redis_insight
    restart: unless-stopped
    ports:
      - "${REDIS_INSIGHT_PORT}:5540"
    networks:
      - manutencao_network
    profiles:
      - tools

# ─────────────────────────────────────────
# Volumes persistentes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ─────────────────────────────────────────
# Rede interna isolada
# ─────────────────────────────────────────
networks:
  manutencao_network:
    driver: bridge
    name: manutencao_network