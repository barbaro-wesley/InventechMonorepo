# docker-compose.prod.yml — Stack completa de produção
# Uso: docker compose -f docker-compose.prod.yml --env-file /opt/inventech/.env up -d
#
# As imagens da API e Web são publicadas no GitHub Container Registry (GHCR)
# pelo pipeline CI/CD e referenciadas aqui pela variável IMAGE_TAG.

services:

  # ─────────────────────────────────────────
  # API — NestJS
  # ─────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/api:${IMAGE_TAG:-latest}
    container_name: inventech_api
    restart: unless-stopped
    env_file: /opt/inventech/.env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /srv/scans/incoming:/srv/scans/incoming
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - inventech_network
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3000/api/v1/health/ping',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────
  # Web — Next.js
  # ─────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/web:${IMAGE_TAG:-latest}
    container_name: inventech_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - inventech_network
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3001',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inventech_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventech_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inventech_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - inventech_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────
  # MinIO
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: inventech_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"  # API MinIO — acessível na rede interna (192.168.0.x)
      - "9001:9001"  # Console MinIO — acessível na rede interna (192.168.0.x)
    volumes:
      - minio_data:/data
    networks:
      - inventech_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─────────────────────────────────────────
  # MinIO Init — cria buckets na primeira execução
  # ─────────────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: inventech_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /init-buckets.sh
    volumes:
      - ./apps/api/docker/minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_PORT: ${MINIO_API_PORT}
    networks:
      - inventech_network
    restart: on-failure

# OCR Worker — Processamento de scans
  # ─────────────────────────────────────────
  ocr-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/ocr-worker:${IMAGE_TAG:-latest}
    container_name: inventech_ocr_worker
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: scans
      SFTP_SCAN_BASE_DIR: /srv/scans/incoming
      OCR_LANG: por
      OCR_DPI: "300"
    volumes:
      - sftp_scans:/srv/scans/incoming
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - inventech_network
    healthcheck:
      test: ["CMD", "pgrep", "ocr-worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# ─────────────────────────────────────────
# Volumes persistentes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  sftp_scans:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/scans/incoming

# ─────────────────────────────────────────
# Rede interna — containers se comunicam por nome
# ─────────────────────────────────────────
networks:
  inventech_network:
    driver: bridge
    name: inventech_network
