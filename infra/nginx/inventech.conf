# /etc/nginx/sites-available/inventech.conf
# Ative com: ln -s /etc/nginx/sites-available/inventech.conf /etc/nginx/sites-enabled/
# Teste com: nginx -t && systemctl reload nginx

# ── Rate limiting global ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── Upstream para os containers ───────────────────────────────────────────────
upstream inventech_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream inventech_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name intranet.hcrmarau.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name intranet.hcrmarau.com.br;

    # ── TLS — Let's Encrypt via Certbot ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/intranet.hcrmarau.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intranet.hcrmarau.com.br/privkey.pem;
    # Esses dois arquivos são gerados automaticamente pelo Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Segurança ──────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Tamanho máximo de upload (deve casar com o limite da API: 50MB) ────────
    client_max_body_size 55M;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── Headers padrão de proxy ────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── API REST ───────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://inventech_api;
    }

    # Rate limit mais restrito nos endpoints de autenticação
    location /api/v1/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://inventech_api;
    }

    location /api/v1/auth/forgot-password {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://inventech_api;
    }

    # ── WebSocket (Socket.IO) ──────────────────────────────────────────────────
    # O Socket.IO sempre usa /socket.io/ como path HTTP, independente do namespace.
    # O namespace (/notifications) é negociado no protocolo, não na URL.
    location /socket.io/ {
        proxy_pass http://inventech_api;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check — sem rate limit, sem log ─────────────────────────────────
    location /api/v1/health {
        proxy_pass http://inventech_api;
        access_log off;
    }

    # ── Frontend Next.js (tudo que não é /api ou /notifications) ──────────────
    location / {
        proxy_pass http://inventech_web;

        # Suporte a Server-Sent Events do Next.js HMR (não necessário em prod, mas não prejudica)
        proxy_set_header Connection "";
    }

    # ── Arquivos estáticos do Next.js — cache agressivo ────────────────────────
    location /_next/static/ {
        proxy_pass http://inventech_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/inventech.access.log;
    error_log  /var/log/nginx/inventech.error.log warn;
}
