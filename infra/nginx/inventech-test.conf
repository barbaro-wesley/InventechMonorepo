# /etc/nginx/sites-available/inventech-test.conf
# Configuração para VM de teste interna — HTTP apenas (sem SSL/domínio)
# Ative com: ln -s /etc/nginx/sites-available/inventech-test.conf /etc/nginx/sites-enabled/
# Teste com: nginx -t && systemctl reload nginx

upstream inventech_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream inventech_web {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # aceita qualquer hostname ou IP direto

    client_max_body_size 55M;

    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── API REST ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://inventech_api;
    }

    # ── WebSocket (Socket.IO / notificações) ───────────────────────────────────
    location /notifications/ {
        proxy_pass http://inventech_api;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check ───────────────────────────────────────────────────────────
    location /api/v1/health {
        proxy_pass http://inventech_api;
        access_log off;
    }

    # ── Frontend Next.js ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://inventech_web;
        proxy_set_header Connection "";
    }

    # ── Estáticos Next.js ──────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://inventech_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    access_log /var/log/nginx/inventech-test.access.log;
    error_log  /var/log/nginx/inventech-test.error.log warn;
}
